<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>Station 8 — Piano Man</title>
  <style>
    /* Styles identiques au fichier précédent pour la cohérence */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f5f3ee; color: #1a1a1a; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 4px; max-width: 560px; width: 100%; padding: 2.5rem 2rem; }
    .etape { font-family: 'Courier New', monospace; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: #888; margin-bottom: 1.5rem; }
    h2 { font-size: 1rem; font-weight: normal; letter-spacing: 0.05em; text-transform: uppercase; color: #555; margin-bottom: 0.75rem; border-bottom: 1px solid #eee; }
    input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; margin: 10px 0; font-size: 1rem; }
    button { width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
    #hidden-content { display: none; margin-top: 2rem; }
    .mot-cle-section { padding: 0.75rem 1rem; background: #f9f9f9; border-left: 3px solid #ddd; margin-bottom: 1.5rem; }
    .indice-section { padding: 0.75rem 1rem; background: #fdfae6; border-left: 3px solid #f1c40f; }
    .footer { margin-top: 2rem; font-size: 0.7rem; color: #bbb; text-align: center; font-family: 'Courier New', monospace; }
  </style>
</head>
<body>
  <div class="card">
    <div class="etape">Étape 8 sur 10 — Les Années 80</div>
    <div id="quiz-ui">
      <h2>🕵️ L'Énigme</h2>
      <p style="font-size: 1.1rem; line-height: 1.6;">
        "Je porte des lunettes excentriques, je joue du piano, et en 1982, j'ai chanté 'I'm Still Standing'. Qui suis-je ?"
      </p>
      <input type="text" id="answer-input" placeholder="Nom de l'artiste..." autocomplete="off">
      <button onclick="check()">Valider</button>
    </div>
    <div id="hidden-content">
      <div class="mot-cle-section">
        <div style="font-size:0.75rem; color:#999;">📝 MOT CLÉ</div>
        <div style="font-family:monospace; font-size:1.2rem; font-weight:bold;">WALKMAN</div>
      </div>
      <div class="indice-section">
        <div style="font-size:0.75rem; color:#999;">📍 PROCHAINE ÉTAPE</div>
        <p>Allez là où les dossiers dorment dans le noir (Les Archives).</p>
      </div>
    </div>
    <div class="footer">Blind Test &bull; 2026</div>
  </div>
  <script>
    function check() {
      const secrets = ["elton john", "elton"];
      const val = document.getElementById('answer-input').value.trim().toLowerCase();
      if (secrets.includes(val)) {
        document.getElementById('quiz-ui').style.display='none';
        document.getElementById('hidden-content').style.display='block';
      } else { alert("Ce n'est pas lui !"); }
    }
  </script>
</body>
</html>
